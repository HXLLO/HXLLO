<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" fill="none">
  <style>
    .name { font: 800 76px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; letter-spacing: -0.04em; }
    .tag { font: 400 22px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; letter-spacing: -0.01em; }
    .mono { font: 500 13px/1 ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, monospace; letter-spacing: 0.12em; text-transform: uppercase; }
